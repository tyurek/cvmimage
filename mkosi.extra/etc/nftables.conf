#!/usr/sbin/nft -f

flush ruleset

table inet tinfoil {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback (shim ↔ upstream containers)
        iif "lo" accept

        # Established/related (return traffic for outbound connections)
        ct state established,related accept

        # ICMP/ICMPv6 (network diagnostics)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # DHCP client
        udp sport 67 udp dport 68 accept

        # Shim TLS port (always open; boot may add more via `nft add rule`)
        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Rules for container-net are added dynamically by tinfoil-boot after the bridge is created
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
