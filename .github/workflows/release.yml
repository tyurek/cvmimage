name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest  # fork: upstream uses a self-hosted `large` runner
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check if prerelease
        id: check-prerelease
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "WARN: This is a prerelease"
          fi

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false

      # fork: free ~25 GB by dropping preinstalled toolchains so the ~10 GB image build fits
      # on a GitHub-hosted runner (no third-party action, to stay zizmor-clean).
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install build dependencies
        run: |
          # Use Ubuntu snapshot to pin packages
          SNAPSHOT_DATE="20260525T000000Z"
          echo "deb [check-valid-until=no] https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_DATE} resolute main restricted universe multiverse" | sudo tee /etc/apt/sources.list
          echo "deb [check-valid-until=no] https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_DATE} resolute-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [check-valid-until=no] https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_DATE} resolute-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
    
          sudo apt-get update
          sudo apt-get install -y pipx ubuntu-keyring debian-archive-keyring make jq binutils zstd
          sudo pipx install git+https://github.com/systemd/mkosi.git@54c625c380ef5500f17460981a3c67b109b6a847 #v25.3
          sudo pipx ensurepath
          mkdir -p packages mkosi.extra/usr/bin

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: '1.25'
          cache: false

      - name: Build tinfoil binaries
        run: |
          mkdir -p mkosi.extra/usr/bin
          cd tinfoil
          go build -ldflags="-s -w" -o ../mkosi.extra/usr/bin/tinfoil-boot ./cmd/boot
          go build -ldflags="-s -w" -o ../mkosi.extra/usr/bin/tinfoil-egress ./cmd/egress
          go build -ldflags="-s -w" -o ../mkosi.extra/usr/bin/tinfoil-shim ./cmd/shim
          sha256sum ../mkosi.extra/usr/bin/tinfoil-boot \
                    ../mkosi.extra/usr/bin/tinfoil-egress \
                    ../mkosi.extra/usr/bin/tinfoil-shim

      # TEMPORARY: drop once cuda-ubuntu2604 ships nvattest. The image
      # digest is also pinned in Makefile; rotate both together via
      # `docker buildx imagetools inspect ubuntu:26.04`.
      - name: Build nvattest from source (in resolute container)
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace \
            -v nvattest-apt-cache:/var/cache/apt \
            -e DEBIAN_FRONTEND=noninteractive \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            ubuntu@sha256:5e275723f82c67e387ba9e3c24baa0abdcb268917f276a0561c97bef9450d0b4 \
            bash -c './build-nvattest.sh'
          ls -la packages/

      - name: Build image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          sudo /opt/pipx_bin/mkosi --image-version "$REF_NAME"

      - name: Fix permissions
        run: |
          mkdir -p /tmp/out
          sudo chmod 644 tinfoilcvm.*
          sudo chown $USER:$USER tinfoilcvm.*

      - name: Generate manifest
        id: manifest
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Generate manifest JSON
          cat > "/tmp/out/tinfoil-inference-${REF_NAME}-manifest.json" << EOF
          {
            "version": "${REF_NAME}",
            "root": "$(objcopy -O binary --only-section .cmdline tinfoilcvm.efi /dev/stdout | cut -d "=" -f 2)",
            "initrd": "$(sha256sum tinfoilcvm.initrd | awk '{print $1}')",
            "kernel": "$(sha256sum tinfoilcvm.vmlinuz | awk '{print $1}')",
            "raw": "$(sha256sum tinfoilcvm.raw | awk '{print $1}')",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          # Copy artifacts with versioned names. The raw is *moved* (it's ~10 GB) to
          # save runner disk; checksums are generated later, after it is split.
          cp tinfoilcvm.initrd "/tmp/out/tinfoil-inference-${REF_NAME}.initrd"
          cp tinfoilcvm.vmlinuz "/tmp/out/tinfoil-inference-${REF_NAME}.vmlinuz"
          mv tinfoilcvm.raw "/tmp/out/tinfoil-inference-${REF_NAME}.raw"

          cd /tmp/out
          echo "digest=sha256:$(sha256sum "tinfoil-inference-${REF_NAME}-manifest.json" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Attest artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3.0.0
        with:
          subject-path: |
            /tmp/out/tinfoil-inference-${{ github.ref_name }}-manifest.json
            /tmp/out/tinfoil-inference-${{ github.ref_name }}.initrd
            /tmp/out/tinfoil-inference-${{ github.ref_name }}.vmlinuz
            /tmp/out/tinfoil-inference-${{ github.ref_name }}.raw

      # Fork note: upstream uploads vmlinuz/initrd/raw to Cloudflare R2. This fork has no R2,
      # so everything goes to the GitHub release. The raw (attested above) is ~10 GB > the
      # 2 GB/asset limit, so it is zstd-compressed and split into <2 GB parts here.
      # Reassemble on the host: cat *.raw.zst.part.* | zstd -d -o tinfoilcvm.raw
      - name: Compress + split the raw
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd /tmp/out
          RAW="tinfoil-inference-${REF_NAME}.raw"
          zstd -3 -T0 --rm "$RAW"                         # -> $RAW.zst (rootfs is ext4, ~1.7 GB sparse)
          split -b 1900M -d "${RAW}.zst" "${RAW}.zst.part."
          rm -f "${RAW}.zst"
          # Checksums over what is actually uploaded (parts, not the bare raw). The full
          # raw's hash stays in the manifest for verification after reassembly.
          sha256sum \
            "tinfoil-inference-${REF_NAME}-manifest.json" \
            "tinfoil-inference-${REF_NAME}.vmlinuz" \
            "tinfoil-inference-${REF_NAME}.initrd" \
            ${RAW}.zst.part.* \
            > "tinfoil-inference-${REF_NAME}-checksums.sha256"
          ls -la

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          IS_PRERELEASE: ${{ steps.check-prerelease.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          ASSETS=(
            "/tmp/out/tinfoil-inference-${REF_NAME}-manifest.json"
            "/tmp/out/tinfoil-inference-${REF_NAME}.vmlinuz"
            "/tmp/out/tinfoil-inference-${REF_NAME}.initrd"
            "/tmp/out/tinfoil-inference-${REF_NAME}-checksums.sha256"
          )
          ASSETS+=( /tmp/out/tinfoil-inference-${REF_NAME}.raw.zst.part.* )

          # Build release notes from the manifest (avoids inline-notes quoting issues).
          {
            echo "### Downloads (GitHub release assets)"
            echo "- Kernel: https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/tinfoil-inference-${REF_NAME}.vmlinuz"
            echo "- Initrd: https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/tinfoil-inference-${REF_NAME}.initrd"
            echo "- Raw: zstd-compressed, split into \`…raw.zst.part.*\`. Reassemble:"
            echo '  ```'
            echo "  cat tinfoil-inference-${REF_NAME}.raw.zst.part.* | zstd -d -o tinfoil-inference-${REF_NAME}.raw"
            echo '  ```'
            echo
            echo '### Manifest'
            echo '```json'
            cat "/tmp/out/tinfoil-inference-${REF_NAME}-manifest.json"
            echo '```'
          } > /tmp/release-notes.md

          # Idempotent: a release for this tag may already exist (created in the UI, or a
          # re-run) — upload/clobber its assets instead of failing.
          if gh release view "$REF_NAME" -R "$REPOSITORY" >/dev/null 2>&1; then
            echo "release $REF_NAME already exists — uploading assets (--clobber)"
            gh release upload "$REF_NAME" -R "$REPOSITORY" --clobber "${ASSETS[@]}"
          else
            gh release create "$REF_NAME" -R "$REPOSITORY" $PRERELEASE_FLAG \
              --title "$REF_NAME" --notes-file /tmp/release-notes.md "${ASSETS[@]}"
          fi

      # Fork note: upstream triggers update-config-repos.yml here to bump cvm-version
      # across every repo with the `tinfoil-functions` topic (i.e. tinfoilsh's). A fork
      # must not do that, so this step is removed and update-config-repos.yml is deleted.
